service: ecommerce-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  architecture: arm64
  memorySize: 512
  timeout: 30
  environment:
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT}
    DB_NAME: ${env:DB_NAME}
    DB_USER: ${env:DB_USER}
    DB_PASSWORD: ${env:DB_PASSWORD}
    DB_POOL_MAX: ${env:DB_POOL_MAX, '5'}
    NODE_ENV: ${env:NODE_ENV, 'production'}
    LOG_LEVEL: ${env:LOG_LEVEL, 'INFO'}

functions:
  # Products
  getProducts:
    handler: src/handlers/products/getProducts.handler
    events:
      - http:
          path: v1/products
          method: GET
          cors: true

  getProductById:
    handler: src/handlers/products/getProductById.handler
    events:
      - http:
          path: v1/products/{id}
          method: GET
          cors: true

  createProduct:
    handler: src/handlers/products/createProduct.handler
    events:
      - http:
          path: v1/products
          method: POST
          cors: true

  # Orders
  getOrders:
    handler: src/handlers/orders/getOrders.handler
    events:
      - http:
          path: v1/orders
          method: GET
          cors: true

  createOrder:
    handler: src/handlers/orders/createOrder.handler
    events:
      - http:
          path: v1/orders
          method: POST
          cors: true

  # Users
  createUser:
    handler: src/handlers/users/createUser.handler
    events:
      - http:
          path: v1/users
          method: POST
          cors: true

plugins:
  - serverless-offline
  - serverless-esbuild
  - serverless-plugin-tracing

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    external:
      - pg
      - aws-sdk
