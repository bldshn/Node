name: Deploy E-Commerce MVP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Type check — catch errors before deploying
  # ─────────────────────────────────────────────────────────────
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check all packages
        run: pnpm -r type-check

  # ─────────────────────────────────────────────────────────────
  # Deploy backend — CDK to AWS
  # Only runs on main branch
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy AWS backend (CDK)
    runs-on: ubuntu-latest
    needs: type-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
        # Alternative: use access key ID and secret
        # with:
        #   aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        #   aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        #   aws-region:            us-east-1

      - name: Build API
        run: pnpm --filter api build

      - name: Deploy CDK stacks
        run: |
          cd infra/cdk
          pnpm install --frozen-lockfile
          npx cdk deploy --all --require-approval never --ci
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1

      - name: Export API URL for next step
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name EcommerceApi --region us-east-1 --query 'Stacks[0].Outputs[?OutputKey==`ApiUrlForFrontend`].OutputValue' --output text)
          echo "API_URL=$API_URL" >> $GITHUB_ENV

      - name: Comment PR with deployment info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Backend deployed to AWS\n\n**API URL:** `' + process.env.API_URL + '`'
            })

  # ─────────────────────────────────────────────────────────────
  # Deploy frontend — Vercel
  # Preview deploys on PR, production on main
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: type-check
    environment:
      name: frontend
      url: ${{ steps.vercel.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Deploy to Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/frontend
          production: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true

  # ─────────────────────────────────────────────────────────────
  # Success notification
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: [type-check]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.type-check.result }}" == "success" ]; then
            echo "✅ Type check passed"
          else
            echo "❌ Type check failed"
            exit 1
          fi
